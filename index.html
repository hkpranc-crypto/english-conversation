<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 雙語導師 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-chat" class="page-container">
        <div class="header">
            <h1>AI 對話練習</h1>
            <div class="nav-group">
                <button onclick="showPage('manage')" class="nav-btn">🗂️ 詞典</button>
                <button onclick="showPage('exam')" class="nav-btn" style="background:#ff9f43;color:white">📝 測驗</button>
            </div>
        </div>

        <!-- 模式切換 -->
        <div class="mode-box">
            <p>選擇模式：</p>
            <select id="practice-mode">
                <option value="cn_to_en">1. 我說中文 ➔ 電腦回英文</option>
                <option value="en_q_to_cn_a">2. 我問英文 ➔ 電腦答中文</option>
                <option value="en_to_en">3. 我問英文 ➔ 電腦答英文</option>
            </select>
        </div>
        
        <div id="chat-box" class="chat-display"></div>

        <button id="mic-btn" class="main-mic-btn">🎤 開始說話</button>
        <div class="input-row">
            <input type="text" id="text-input" placeholder="輸入文字進行比對...">
            <button id="send-btn">發送</button>
        </div>
    </div>

    <div id="page-manage" class="page-container" style="display:none;">
        <div class="header">
            <button onclick="showPage('chat')" class="nav-btn">⬅️ 返回</button>
            <h1>詞典管理</h1>
        </div>
        
        <!-- 分類過濾器 -->
        <div class="filter-box">
            <select id="category-filter" onchange="renderCards()">
                <option value="All">所有分類</option>
                <option value="Greetings">基本問候</option>
                <option value="Daily">日常生活</option>
                <option value="Shopping">購物服務</option>
                <option value="Eating">餐飲飲食</option>
                <option value="Travel">旅遊交通</option>
                <option value="Social">社交計劃</option>
                <option value="Work">工作辦公</option>
                <option value="Health">健康心情</option>
                <option value="Help">請求幫助</option>
                <option value="Opinions">意見偏好</option>
            </select>
        </div>

        <div id="card-grid" class="card-layout"></div>
    </div>

    <!-- 編輯/新增 彈窗 -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">編輯卡片</h3>
            <select id="edit-cat">
                <option value="Greetings">基本問候</option>
                <option value="Daily">日常生活</option>
                <option value="Shopping">購物服務</option>
                <!-- ... 其他省略 -->
            </select>
            <input type="text" id="edit-q-en" placeholder="問題 (英)">
            <input type="text" id="edit-q-cn" placeholder="問題 (中)">
            <input type="text" id="edit-a-en" placeholder="回答 (英)">
            <input type="text" id="edit-a-cn" placeholder="回答 (中)">
            <div class="modal-btns">
                <button id="save-edit-btn" style="background:#2ed573; color:white">儲存</button>
                <button id="delete-card-btn" style="background:#ff4757; color:white">刪除</button>
                <button onclick="closeModal()" style="background:#ccc">取消</button>
            </div>
        </div>
    </div>

    <!-- 測驗頁面保持基本功能 -->
    <div id="page-exam" class="page-container" style="display:none;">
        <div class="header"><button onclick="showPage('chat')" class="nav-btn">⬅️ 結束</button><h1>測驗</h1></div>
        <div class="exam-box">
            <h2 id="exam-question">---</h2>
            <p id="exam-feedback"></p>
            <button id="exam-mic-btn" class="main-mic-btn" style="background:#ff9f43">🎤 說出英文答案</button>
            <button id="next-exam-btn" class="secondary-btn">下一題</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
