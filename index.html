<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英文導師 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="page-chat" class="page-container">
        <div class="header">
            <h1>AI 對話練習</h1>
            <div class="nav-group">
                <button onclick="showPage('manage')" class="nav-btn">🗂️ 詞典</button>
                <button onclick="showPage('exam')" class="nav-btn" style="background:#ff9f43;color:white">📝 測驗</button>
            </div>
        </div>
        <div class="mode-selector">
            <label><input type="radio" name="chat-mode" value="en" checked> 英對英</label>
            <label><input type="radio" name="chat-mode" value="cn"> 中對英</label>
        </div>
        <div id="chat-box" class="chat-display"></div>
        <button id="mic-btn" class="main-mic-btn">🎤 語音輸入</button>
        <div class="input-row">
            <input type="text" id="text-input" placeholder="打字也可以...">
            <button id="send-btn">發送</button>
        </div>
    </div>

    <div id="page-manage" class="page-container" style="display:none;">
        <div class="header">
            <button onclick="showPage('chat')" class="nav-btn">⬅️ 返回</button>
            <h1>詞典管理</h1>
        </div>
        <div class="add-box">
            <input type="text" id="new-q" placeholder="問題 (中/英)">
            <input type="text" id="new-a" placeholder="電腦回覆 (英)">
            <button id="add-card-btn">➕ 新增對話卡片</button>
        </div>
        <div id="card-grid" class="card-layout"></div>
    </div>

    <div id="page-exam" class="page-container" style="display:none;">
        <div class="header">
            <button onclick="showPage('chat')" class="nav-btn">⬅️ 結束</button>
            <h1>翻譯測驗</h1>
        </div>
        <div class="exam-box">
            <p id="exam-prompt">準備好了嗎？</p>
            <h2 id="exam-question">---</h2>
            <p id="exam-feedback" style="height:30px; font-weight:bold; margin:10px 0;"></p>
            <button id="exam-mic-btn" class="main-mic-btn" style="background:#ff9f43">🎤 說出答案</button>
            <button id="next-exam-btn" class="secondary-btn">下一題</button>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>編輯卡片內容</h3>
            <input type="text" id="edit-q">
            <input type="text" id="edit-a">
            <div class="modal-btns">
                <button id="save-edit-btn" style="background:#2ed573; color:white">儲存修改</button>
                <button id="delete-card-btn" style="background:#ff4757; color:white">刪除卡片</button>
                <button onclick="closeModal()" style="background:#ccc">取消</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
